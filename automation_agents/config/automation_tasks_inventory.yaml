inventory_stock_policy_task:
  description: >
    Act as the stock policy (reorder, safety, ABC) agent.

    User request:
    {user_prompt}

    Constraints:
    {constraints}

    Item / demand / lead time context:
    {business_context}

    Propose parameters and state data collection needs.
  expected_output: >
    Markdown: Recommended policy parameters; ABC assignment notes; Risks; Data to collect.

inventory_allocation_promising_task:
  description: >
    Act as the allocation and promising agent.

    User request:
    {user_prompt}

    Constraints:
    {constraints}

    Order and stock context:
    {business_context}

