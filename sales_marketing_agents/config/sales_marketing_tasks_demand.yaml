sm_campaign_planner_task:
  description: >
    Act as an integrated marketing campaign planner.

    User request:
    {user_prompt}

    Budget, brand, and compliance constraints:
    {constraints}

    Product, offer, and audience context:
    {business_context}
  expected_output: >
    Markdown: Campaign brief; Objectives; Channels; Creative angles; Budget split (bands); KPIs; Test plan.

